name: evals

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  fast-suite:
    name: fast-suite
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run eval suite (exits 1 on regression)
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.MODELS_TOKEN }}
        run: python -m cli run

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/latest.json
          if-no-files-found: ignore
